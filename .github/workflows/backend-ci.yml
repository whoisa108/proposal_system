name: Backend CI

on:
  push:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'
  pull_request:
    branches: [ main, develop ]
    paths:
      - 'backend/**'
      - '.github/workflows/backend-ci.yml'

jobs:
  secret-scan:
    name: Secret scan
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install detect-secrets
        run: pip install detect-secrets

      - name: Run detect-secrets
        run: detect-secrets scan --baseline .secrets.baseline

  trivy:
    name: Trivy vulnerability scan
    runs-on: ubuntu-latest
    needs: secret-scan
    permissions:
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Trivy
        run: |
          curl -sfL https://raw.githubusercontent.com/aquasecurity/trivy/main/contrib/install.sh \
            | sh -s -- -b /usr/local/bin
          trivy --version

      - name: Run Trivy (CRITICAL & HIGH CVEs)
        run: |
          trivy fs backend \
            --format sarif \
            --output trivy-results.sarif \
            --severity CRITICAL,HIGH \
            --ignorefile backend/.trivyignore \
            --exit-code 1

      - name: Upload Trivy results to GitHub Security
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

  codeql:
    name: CodeQL analysis (Java)
    runs-on: ubuntu-latest
    needs: secret-scan
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: java
          queries: security-extended

      - name: Build for CodeQL
        working-directory: backend
        run: mvn clean compile -DskipTests

      - name: Perform CodeQL analysis
        uses: github/codeql-action/analyze@v4
        with:
          category: backend-java

  test:
    name: Maven verify (tests + SpotBugs)
    runs-on: ubuntu-latest
    needs: secret-scan

    env:
      MONGODB_URI:        ${{ secrets.MONGODB_URI }}
      JWT_SECRET:         ${{ secrets.JWT_SECRET }}
      MINIO_ENDPOINT:     ${{ secrets.MINIO_ENDPOINT }}
      MINIO_ACCESS_KEY:   ${{ secrets.MINIO_ACCESS_KEY }}
      MINIO_SECRET_KEY:   ${{ secrets.MINIO_SECRET_KEY }}
      ADMIN_EMPLOYEE_ID:  ${{ secrets.ADMIN_EMPLOYEE_ID }}
      ADMIN_PASSWORD:     ${{ secrets.ADMIN_PASSWORD }}
      USER_EMPLOYEE_ID:   ${{ secrets.USER_EMPLOYEE_ID }}
      USER_PASSWORD:      ${{ secrets.USER_PASSWORD }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'maven'

      - name: Run Maven verify
        working-directory: backend
        run: mvn clean verify

      - name: Upload JaCoCo report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: jacoco-report
          path: backend/target/site/jacoco/
