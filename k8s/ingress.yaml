# Ingress is the "front door" of the cluster.
# K3s ships with Traefik as the ingress controller — no extra install needed.
#
# Routing rules:
#   esg.local/api/... → backend-svc:8080  (Spring Boot API)
#   esg.local/        → frontend-svc:80   (React app via nginx)
#
# The frontend's nginx then handles /api/ calls by proxying to backend-svc
# internally — so the browser only ever talks to one host.
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: esg-ingress
  namespace: esg
  annotations:
    traefik.ingress.kubernetes.io/router.entrypoints: web
spec:
  rules:
    - host: esg.local   # Add "127.0.0.1 esg.local" to your /etc/hosts to test locally
      http:
        paths:
          # /api goes directly to backend (bypasses nginx proxy — cleaner routing)
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: backend-svc
                port:
                  number: 8080
          # Everything else goes to the frontend
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend-svc
                port:
                  number: 80
