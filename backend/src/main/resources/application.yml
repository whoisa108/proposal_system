server:
  port: 8080

spring:
  data:
    mongodb:
      uri: ${MONGODB_URI}

  servlet:
    multipart:
      max-file-size: 5MB
      max-request-size: 10MB

jwt:
  secret: ${JWT_SECRET}
  expiration-ms: 86400000  # 24 小時

minio:
  endpoint: ${MINIO_ENDPOINT}
  access-key: ${MINIO_ACCESS_KEY}
  secret-key: ${MINIO_SECRET_KEY}
  bucket: esg-proposals

admin:
  default-employee-id: ${ADMIN_EMPLOYEE_ID}
  default-password: ${ADMIN_PASSWORD}
  default-name: 系統管理員
  default-department: AAID

user:
  default-employee-id: ${USER_EMPLOYEE_ID}
  default-password: ${USER_PASSWORD}
  default-name: 測試帳號
  default-department: AAID

deadline:
  end-date: 2026-03-15T23:59:59Z

# Actuator: only expose the health endpoint (used by Kubernetes probes)
# Never expose /actuator/env or /actuator/beans in production — they leak config
management:
  endpoints:
    web:
      exposure:
        include: health
  endpoint:
    health:
      show-details: never