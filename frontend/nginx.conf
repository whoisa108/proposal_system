server {
    listen 80;
    root /usr/share/nginx/html;
    index index.html;

    # ── React SPA routing ──────────────────────────────────────────────────────
    # React uses client-side routing (React Router). When a user navigates to
    # /dashboard directly (e.g. by refreshing), nginx would normally look for
    # a file at dist/dashboard — which doesn't exist — and return 404.
    #
    # try_files says: "try the exact file, then the exact directory, then fall
    # back to index.html". React Router then reads the URL and renders the
    # correct page in JavaScript.
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── API proxy ─────────────────────────────────────────────────────────────
    # The React app calls /api/... (e.g. /api/auth/login).
    # nginx intercepts these and forwards them to the backend Service.
    #
    # Why proxy instead of calling backend directly from the browser?
    # 1. No CORS issues — browser sees one origin (esg.local), not two.
    # 2. The backend's internal cluster address never leaks to the browser.
    # 3. backend-svc is the Kubernetes Service name — resolvable inside the cluster.
    location /api/ {
        proxy_pass http://backend-svc:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
