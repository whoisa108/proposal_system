repos:
  - repo: https://github.com/Yelp/detect-secrets
    rev: v1.5.0
    hooks:
      - id: detect-secrets
        args: ['--baseline', '.secrets.baseline']
        exclude: package-lock\.json

  - repo: local
    hooks:
      - id: maven-verify
        name: Maven verify (tests + coverage gate)
        language: script
        entry: scripts/run-tests.sh
        pass_filenames: false
        # Only run when backend Java source or test files change
        files: ^backend/src/
